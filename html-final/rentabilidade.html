<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rentabilidade | Planning BI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css?v=3">
    <link rel="stylesheet" href="css/layout.css?v=3">
    <link rel="stylesheet" href="css/components.css?v=2">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <div class="logo">
                    <div class="radial-symbol"></div>
                    <span class="logo-text">Planning</span>
                </div>
            </div>
            <nav class="nav-menu">
                <a href="ebitda.html" class="nav-item">
                    <span class="nav-icon">📊</span>
                    EBITDA
                </a>
                <a href="rentabilidade.html" class="nav-item active">
                    <span class="nav-icon">📈</span>
                    Rentabilidade
                </a>
                <a href="custos.html" class="nav-item">
                    <span class="nav-icon">💸</span>
                    Análise de Custos
                </a>
            </nav>
            <div class="tagline">
                Building your company's future. <span class="highlight-today">Today.</span>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="executive-header">
                <div class="header-titles">
                    <h1>Análise de Rentabilidade</h1>
                    <p class="subtitle">Detalhamento de margens, lucro bruto e líquido</p>
                </div>
                <div class="header-filters">
                    <button class="theme-toggle" id="theme-toggle" title="Alternar Tema">🌙</button>
                    <select class="filter-dropdown" id="filter-ano">
                        <option value="">Ano: Todos</option>
                    </select>
                    <select class="filter-dropdown" id="filter-empresa">
                        <option value="">Empresa: Todas</option>
                    </select>
                </div>
            </header>
            
            <div class="gradient-line"></div>

            <section class="kpi-section" id="kpi-container">
                <!-- KPIs renderizados via JS -->
            </section>

            <section class="charts-section">
                <div class="chart-container">
                    <h3>Margem Bruta vs Margem Líquida</h3>
                    <div class="chart-wrapper">
                        <canvas id="marginChart"></canvas>
                    </div>
                </div>
                <div class="chart-container">
                    <h3>Impacto de Despesas Não Operacionais</h3>
                    <div class="chart-wrapper">
                        <canvas id="nonOpChart"></canvas>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/app.js?v=3"></script>
    <script src="js/charts/rentabilidadeChart.js"></script>
</body>
</html>
